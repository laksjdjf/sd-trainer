# ⚠️ 移行のお知らせ

このプロジェクトは **Hydra** に対応しました！

## 新しい使い方（推奨）

Hydraを使用する場合、設定ファイルは `conf/` ディレクトリに配置してください。

```bash
# デフォルト設定で実行
python main.py

# コマンドラインで設定をオーバーライド
python main.py main.epochs=10 main.seed=1234

# conf/example.yaml を使用
python main.py --config-name=example
```

## 古い使い方（非推奨）

以前の方法でも動作しますが、Hydraの機能は利用できません：

```bash
# 注意：この方法は動作しません
# python main.py config/example.yaml
```

このファイル（config/example.yaml）は参考用として残されています。
新しい設定は `conf/config.yaml` と `conf/example.yaml` を参照してください。

---

# 以下は古い設定ファイル（参考用）

main:
  model_path: "cagliostrolab/animagine-xl-3.0"
  output_path: "output"
  seed: 4545
  sdxl: true
  clip_skip: null
  steps: null
  epochs: 5
  save_steps: null
  save_epochs: 1
  sample_steps: null
  sample_epochs: 1
  log_level: "logging.INFO"
  wandb: sd-trainer

trainer:
  module: modules.trainer.BaseTrainer
  train_unet: false
  train_text_encoder: false
  te_device: "cuda"
  vae_device: "cuda"
  train_dtype: torch.float32
  weight_dtype: torch.bfloat16
  autocast_dtype: null
  vae_dtype: null
  lr: "1e-3"
  lr_scheduler: "cosine"
  gradient_checkpointing: true
  optimizer:
    module: torch.optim.AdamW
    args: null
  validation_num_samples: 4
  validation_seed: 4545
  validation_args:
    prompt: "1girl, solo"
    negative_prompt: "lowres, bad anatomy, bad hands, worst quality"
    width: 832
    height: 1216

dataset:
  module: modules.dataset.BaseDataset
  args:
    batch_size: 1
    path: "dataset"
    metadata: "buckets.json"
    original_size: "original_size.json"

dataloader:
  module: torch.utils.data.DataLoader
  args:
      num_workers: 4
      shuffle: true

network:
  train: true
  args:
    module: networks.lora.LoRAModule
    module_args:
      rank: 4
    conv_module_args:
      rank: 4
    text_module_args: null